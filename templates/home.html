{% extends "base.html" %}
{% load static %}
{% block content %}

<h2 class="section-title">Сеты</h2>

<section class="menu">

{% for item in products %}
<div class="card">

    <img src="{% static item.image %}" class="card-img">

    <h3>{{ item.name }}</h3>
    <p>{{ item.description }}</p>
    <div class="price">{{ item.price }}₸</div>

</div>
{% endfor %}

</section>

{% endblock %}
